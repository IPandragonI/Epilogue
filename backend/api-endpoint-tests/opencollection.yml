opencollection: 1.0.0

info:
  name: Notion Epylogue
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Notion-Version
      value: 2026-03-11
  auth:
    type: bearer
    token: cle notion api


docs:
  content: |+
    Proccess pour créer des document

    1. Créer une page vierge dans le notion en question

    2. Créer une intégration qui pointe vers la page créé (https://www.notion.so/profile/integrations/internal) 


    3. Récupérer la clé secrète de l'intégration interne

    4. mettre la clé dans l'auth

    5. Récupérer l'id de la page : prendre l'url de la page (exemple : https://www.notion.so/Epylogue-document-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx) Récupérer l'identifiant après document et rajouter des - comme sur le modèle suivant : xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      
    6. Créer avec la requete 'create child page' en utilisant l'id créer avant comme id de page

  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git

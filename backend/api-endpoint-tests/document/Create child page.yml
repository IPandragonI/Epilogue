info:
  name: "Create child page "
  type: http
  seq: 1

http:
  method: POST
  url: https://api.notion.com/v1/pages
  headers:
    - name: ""
      value: ""
  body:
    type: json
    data: |-
      {
        "parent": {
          "page_id": {{page_id}}
        },
        "properties": {
          "title": {
            "title": [
              {
                "text": {
                  "content": "Nouvelle page enfant 🚀"
                }
              }
            ]
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

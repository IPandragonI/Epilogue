info:
  name: "delete page "
  type: http
  seq: 1

http:
  method: PATCH
  url: https://api.notion.com/v1/pages/{{page_id}}
  body:
    type: json
    data: |-
      {
        "in_trash": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

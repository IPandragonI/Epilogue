info:
  name: create database on page
  type: http
  seq: 1

http:
  method: POST
  url: https://api.notion.com/v1/databases
  body:
    type: json
    data: |-
      {
        "parent": {
          "page_id": "{{page_id}}"
        },
        "title": [
          {
            "type": "text",
            "text": {
              "content": "Ma base de données 🚀"
            }
          }
        ],
        "properties": {
          "Name": {
            "title": {}
          },
          "Status": {
            "select": {
              "options": [
                { "name": "To Do", "color": "red" },
                { "name": "In Progress", "color": "yellow" },
                { "name": "Done", "color": "green" }
              ]
            }
          },
          "Date": {
            "date": {}
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

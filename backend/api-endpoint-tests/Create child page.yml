info:
  name: "Create child page "
  type: http
  seq: 1

http:
  method: POST
  url: https://api.notion.com/v1/pages
  headers:
    - name: Notion-Version
      value: " 2022-06-28"
  body:
    type: json
    data: |-
      {
        "parent": {
          "page_id": "33651886-0e98-80ff-b22b-d8963e8188aa"
        },
        "properties": {
          "title": {
            "title": [
              {
                "text": {
                  "content": "Nouvelle page enfant 🚀"
                }
              }
            ]
          }
        }
      }
  auth:
    type: bearer
    token: Your notion api key

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

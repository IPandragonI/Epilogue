name: epilogue

services:
  mysql:
    image: mysql:8
    container_name: epilogue-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: epilogue-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: epilogue-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:

networks:
  default:
    driver: bridge
